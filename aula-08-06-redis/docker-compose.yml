version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: aula_redis
    ports:
      - "6379:6379"
    restart: always

  redisinsight:
    image: redis/redisinsight:latest
    container_name: aula_redis_ui
    ports:
      - "5540:5540"
    restart: always

# docker exec -it aula_redis redis-cli